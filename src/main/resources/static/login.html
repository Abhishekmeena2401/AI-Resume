<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smartplace – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0f1a;
      --surface:  #111827;
      --card:     #151e2e;
      --border:   #1f2d42;
      --accent:   #3b82f6;
      --accent2:  #06b6d4;
      --green:    #22c55e;
      --red:      #ef4444;
      --text:     #e2e8f0;
      --muted:    #64748b;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      pointer-events: none;
    }
    body::before {
      width: 400px; height: 400px;
      background: rgba(59,130,246,0.07);
      top: -80px; left: -80px;
    }
    body::after {
      width: 300px; height: 300px;
      background: rgba(6,182,212,0.06);
      bottom: -40px; right: -40px;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 32px;
      position: relative; z-index: 1;
    }
    .logo span { font-weight: 300; }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--surface);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: 'Sora', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: white;
    }

    /* Forms */
    .form-panel { display: none; }
    .form-panel.active { display: block; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: 0.9rem;
      margin-bottom: 18px;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: var(--accent); }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 9px;
      color: white;
      font-family: 'Sora', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-submit:hover { opacity: 0.88; transform: translateY(-1px); }

    .msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
    }
    .msg.success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: var(--green);
    }
    .msg.error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--red);
    }

    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-size: 0.78rem;
      color: var(--muted);
      position: relative; z-index: 1;
    }

    .admin-button {
  display: inline-block;
  padding: 12px 20px;
  border-radius: 10px;
  border: none;

  background: linear-gradient(135deg, #3b82f6, #06b6d4); /* blue → cyan */
  color: white;

  font-family: 'Sora', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;

  cursor: pointer;
  transition: all 0.25s ease;

  box-shadow: 0 4px 15px rgba(59,130,246,0.3);
}


  </style>
</head>
<body>

<div class="logo">Smart<span>place</span></div>

<div class="auth-card">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Login</button>
    <button class="tab-btn" onclick="switchTab('register')">Register</button>
  </div>

  <!-- LOGIN FORM -->
  <div class="form-panel active" id="loginPanel">
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="you@example.com"/>
    <label>Password</label>
    <input type="password" id="loginPassword" placeholder="••••••••"/>
    <button class="btn-submit" onclick="handleLogin()">Login →</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- REGISTER FORM -->
  <div class="form-panel" id="registerPanel">
    <label>Full Name</label>
    <input type="text" id="regName" placeholder="Your name"/>
    <label>Email</label>
    <input type="email" id="regEmail" placeholder="you@example.com"/>
    <label>Password</label>
    <input type="password" id="regPassword" placeholder="Create password"/>
    <button class="btn-submit" onclick="handleRegister()">Create Account →</button>
    <div class="msg" id="registerMsg"></div>
  </div>
</div>

<div class="footer-note">Resume Analyzer powered by Cerebras AI</div>

<div class="footer-note" onclick="window.location.href='admin-login.html'">
   <button class="admin-button"> Admin Login </button>
</div>

<script>
  // Tab switching
  function switchTab(tab) {
    document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
    document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
  }

  function showMsg(id, type, text) {
    const el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.textContent = text;
    el.style.display = 'block';
  }

  // ---------- LOGIN ----------
  // NOTE: Replace this with real API call to your Spring Boot backend

 function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value.trim();

  if (!email || !password) {
    showMsg('loginMsg', 'error', 'Please fill in all fields.');
    return;
  }

  fetch("/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      localStorage.setItem('email', data.email);
      localStorage.setItem('username', data.name);

      showMsg('loginMsg', 'success', 'Login successful!');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    } else {
      showMsg('loginMsg', 'error', data.message);
    }
  })
  .catch(() => {
    showMsg('loginMsg', 'error', 'Server error');
  });
}

  // ---------- REGISTER ----------
 function handleRegister() {
  const name     = document.getElementById('regName').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value.trim();

  if (!name || !email || !password) {
    showMsg('registerMsg', 'error', 'Please fill in all fields.');
    return;
  }

  fetch("/register", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, email, password })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      showMsg('registerMsg', 'success', data.message);
      setTimeout(() => switchTab('login'), 1200);
    } else {
      showMsg('registerMsg', 'error', data.message);
    }
  })
  .catch(() => {
    showMsg('registerMsg', 'error', 'Server error');
  });
}
</script>
</body>
</html>
