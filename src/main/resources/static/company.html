<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smartplace – Companies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0f1a; --surface: #111827; --card: #151e2e; --border: #1f2d42;
      --accent: #3b82f6; --accent2: #06b6d4; --green: #22c55e;
      --text: #e2e8f0; --muted: #64748b; --radius: 14px;
    }
    body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ─── NAVBAR ─── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 40px; border-bottom: 1px solid var(--border);
      background: rgba(11,15,26,0.9); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .logo span { font-weight: 300; }
    .nav-links { display: flex; gap: 8px; align-items: center; }
    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: 0.88rem; font-weight: 500;
      padding: 7px 14px; border-radius: 8px; transition: all 0.2s;
    }
    .nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-links a.active { color: var(--accent); background: rgba(59,130,246,0.1); }
    .btn-logout {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.8rem;
      transition: all 0.2s; font-family: 'Sora', sans-serif; margin-left: 8px;
    }
    .btn-logout:hover { border-color: #ef4444; color: #ef4444; }

    /* ─── HERO ─── */
    .hero { text-align: center; padding: 56px 20px 40px; }
    .hero-tag {
      display: inline-block; background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.3); color: var(--accent);
      font-size: 0.75rem; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; padding: 5px 14px; border-radius: 20px; margin-bottom: 20px;
    }
    .hero h1 { font-size: 2.4rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 12px; }
    .hero h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero p { color: var(--muted); font-size: 0.95rem; max-width: 440px; margin: 0 auto; }

    /* ─── GRID ─── */
    .grid-wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }
    .company-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;
    }

    /* ─── COMPANY CARD ─── */
    .company-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 28px; display: flex; flex-direction: column; gap: 14px;
      transition: border-color 0.25s, transform 0.25s;
    }
    .company-card:hover { border-color: var(--accent); transform: translateY(-3px); }

    .company-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(6,182,212,0.2));
      border: 1px solid rgba(59,130,246,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }
    .company-name { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .company-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.6; flex: 1; }

    .company-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
    .package-badge {
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25);
      color: var(--green); font-size: 0.78rem; font-weight: 600;
      padding: 4px 10px; border-radius: 99px;
      font-family: 'JetBrains Mono', monospace;
    }
    .btn-apply {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 8px; color: white; font-size: 0.82rem;
      font-weight: 600; padding: 8px 18px; cursor: pointer; text-decoration: none;
      font-family: 'Sora', sans-serif; transition: opacity 0.2s;
    }
    .btn-apply:hover { opacity: 0.85; }

    /* ─── LOADING / EMPTY ─── */
    .state-msg {
      text-align: center; padding: 80px 20px; color: var(--muted); font-size: 0.95rem;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .fade-in { opacity: 0; transform: translateY(12px); animation: fadeUp 0.4s ease forwards; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      nav { padding: 14px 16px; }
      .nav-links a { padding: 6px 10px; font-size: 0.8rem; }
      .hero h1 { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

<!-- ─── NAVBAR ─── -->
<nav>
  <a class="logo" href="index.html">Smart<span>place</span></a>
  <div class="nav-links">
    <a href="index.html"> Resume</a>
    <a href="company.html" class="active"> Companies</a>
    <a href="course.html"> Courses</a>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>


<!-- ─── HERO ─── -->
<div class="hero">
  <div class="hero-tag">✦ Opportunities</div>
  <h1>Explore <span>Companies</span></h1>
  <p>Browse companies that are hiring and apply directly through their portal.</p>
</div>

<!-- ─── COMPANIES GRID ─── -->
<div class="grid-wrap">
  <div id="companyGrid" class="company-grid">
    <div class="state-msg">
      <div class="spinner"></div>
      <p>Loading companies…</p>
    </div>
  </div>
</div>

<script>
  // ─── AUTH CHECK ───────────────────────────────────────────────
  // If user is not logged in, redirect to login page
  if (!localStorage.getItem('email')) {
    window.location.href = 'login.html';
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
  }

  // ─── FETCH & RENDER COMPANIES ─────────────────────────────────
  async function loadCompanies() {
    const grid = document.getElementById('companyGrid');

    try {
      const res  = await fetch('/companies');
      const data = await res.json();   // data is an array of company objects

      if (!data || data.length === 0) {
        grid.innerHTML = '<div class="state-msg"> No companies listed yet. Check back soon!</div>';
        return;
      }

      // Company icons - just emojis for fun
      const icons = ['🏢', '💼', '🚀', '💡', '🌐', '⚡', '🔷', '🎯'];

      grid.innerHTML = data.map((company, index) => `
        <div class="company-card fade-in" style="animation-delay: ${index * 0.07}s">
          <div class="company-icon">${icons[index % icons.length]}</div>
          <div class="company-name">${company.name}</div>
          <div class="company-desc">${company.description}</div>
          <div class="company-footer">
            <span class="package-badge"> ${company.packageOffered}</span>
            <a class="btn-apply" href="${company.applyLink}" target="_blank" rel="noopener">
              Apply →
            </a>
          </div>
        </div>
      `).join('');

    } catch (err) {
      grid.innerHTML = '<div class="state-msg">⚠️ Could not load companies. Is the server running?</div>';
    }
  }

  loadCompanies();   // Run when page loads
</script>
</body>
</html>
